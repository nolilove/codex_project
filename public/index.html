<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>태초서약 내기 트래커</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-left" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-right" aria-hidden="true"></div>

    <main class="container">
      <section class="hero">
        <img class="hero-logo" src="/assets/logo.webp" alt="태초서약 내기 로고" />
        <div class="hero-copy">
          <h1>태초서약 내기 트래커</h1>
          <p>기준 시각: 2026-03-30 12:00 (KST) 이후 최초 획득 1회 기준</p>
          <div class="progress-wrap">
            <div class="progress-meta">
              <span>진행률</span>
              <span id="progress-label">0 / 4</span>
            </div>
            <div class="progress-track">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="result-panel">
        <h2>현재 판정</h2>
        <p id="result-text">아직 4명 모두 확정되지 않았습니다.</p>
      </section>

      <section>
        <h2>참가자 상태</h2>
        <div id="participants" class="cards"></div>
      </section>
    </main>

    <template id="card-template">
      <article class="card">
        <h3 class="name"></h3>
        <p class="stamp">최초 획득 시각: <span class="first-acquired">미기록</span></p>
        <label>
          획득 수량
          <input class="count-input" type="number" min="0" step="1" value="0" />
        </label>
        <button class="save-btn" type="button">저장</button>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
