<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>태초서약 내기 트래커</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-left" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-right" aria-hidden="true"></div>

    <main class="container">
      <section class="hero">
        <img class="hero-logo" src="/assets/logo.webp" alt="태초서약 내기 로고" />
        <div class="hero-copy">
          <h1>태초서약 내기 트래커</h1>
          <p id="baseline-label">기준 시각: 2026-03-30 12:00 (KST) 이후 태초서약 선취득 기준</p>
          <div class="progress-wrap">
            <div class="progress-meta">
              <span>진행률</span>
              <span id="progress-label">0 / 0</span>
            </div>
            <div class="progress-track">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="result-panel">
        <h2>현재 판정</h2>
        <p id="result-text">참가자를 추가하고 동기화하세요.</p>
      </section>

      <section class="search-panel">
        <h2>참가자 검색/추가</h2>
        <div class="search-grid">
          <label>
            검색 기준
            <select id="mode-select">
              <option value="server">서버</option>
              <option value="adventure">모험단</option>
            </select>
          </label>
          <label>
            서버
            <select id="server-select"></select>
          </label>
          <label class="keyword-wrap">
            검색어
            <input id="keyword-input" type="text" placeholder="캐릭터명 또는 모험단명" />
          </label>
          <button id="search-btn" class="save-btn" type="button">검색</button>
        </div>
        <p class="stamp">
          모험단 검색은 공식 API 특성상 캐릭터 검색 결과를 기본정보로 보강해 모험단명을 필터링합니다.
        </p>
        <div id="search-results" class="cards"></div>
      </section>

      <section>
        <div class="section-header">
          <h2>참가자 상태</h2>
          <button id="refresh-all-btn" class="save-btn" type="button">전체 동기화</button>
        </div>
        <div id="participants" class="cards"></div>
      </section>
    </main>

    <template id="search-card-template">
      <article class="card">
        <div class="card-head">
          <img class="char-avatar" alt="캐릭터 아바타" />
          <div>
            <h3 class="name"></h3>
            <p class="stamp search-meta"></p>
          </div>
        </div>
        <button class="save-btn add-btn" type="button">참가자 추가</button>
      </article>
    </template>

    <template id="participant-card-template">
      <article class="card">
        <div class="card-head">
          <img class="char-avatar" alt="참가자 아바타" />
          <h3 class="name"></h3>
        </div>
        <p class="stamp adventure"></p>
        <p class="stamp oath-count"></p>
        <p class="stamp crystal-count"></p>
        <p class="stamp first-oath"></p>
        <details>
          <summary>타임라인</summary>
          <ul class="timeline-list"></ul>
        </details>
        <div class="row-actions">
          <button class="save-btn sync-btn" type="button">동기화</button>
          <button class="danger-btn remove-btn" type="button">삭제</button>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
